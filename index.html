<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Point Zero B2B — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Inter:wght@300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0C0C0C;
      color: #F5F4F1;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(40px, 8vw, 100px) clamp(24px, 5vw, 80px);
      text-align: center;
    }

    .logo {
      width: clamp(200px, 36vw, 380px);
      opacity: 0;
      animation: fadeUp 1s ease forwards 0.2s;
      margin-bottom: clamp(44px, 6vw, 72px);
    }

    .rule {
      height: 1px;
      background: #B89A6A;
      width: 0;
      animation: growRule 1.2s cubic-bezier(0.4,0,0.2,1) forwards 0.65s;
      margin-bottom: clamp(32px, 4.5vw, 52px);
    }

    .b2b-label {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: clamp(10px, 1vw, 11px);
      letter-spacing: 0.44em;
      text-transform: uppercase;
      color: #B89A6A;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 1.05s;
      margin-bottom: clamp(16px, 2.5vw, 24px);
    }

    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(44px, 7vw, 92px);
      line-height: 1.05;
      color: #F5F4F1;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.2s;
    }

    .divider {
      width: 1px;
      height: clamp(16px, 2.5vw, 24px);
      background: #2A2A2A;
      margin: clamp(18px, 3vw, 28px) 0;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 1.35s;
    }

    .footer {
      position: fixed;
      bottom: 32px;
      left: 0; right: 0;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #333;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 1.6s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes growRule {
      from { width: 0; }
      to   { width: min(420px, 55vw); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0.01ms !important;
      }
    }
  </style>
</head>
